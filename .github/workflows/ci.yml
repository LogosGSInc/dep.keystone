name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          python -m pytest -q

      - name: Verify example artifact generation
        run: |
          dep-keystone verify --input ./examples/sample_requirements.txt --type requirements.txt --out ./out
          test -f ./out/normalized-graph.json
          test -f ./out/verification-report.json
          test -f ./out/evidence.sha256
